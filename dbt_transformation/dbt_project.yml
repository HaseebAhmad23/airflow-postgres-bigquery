name: 'dbt_transformation'
version: '1.0.0'

profile: 'dbt_transformation'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be found in the "models/" directory.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


models:
  dbt_transformation:
    # Config indicated by + and applies to all files under models/
    staging:
      +materialized: view
    marts:
      +materialized: table
